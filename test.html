<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<script>
		var img = 'http://imgs.fireapps.vn/uploads/43918917797/1597735743QuVHL50f468e0d5679200d50bf38e1722fe57.jpg';
		loadImage(img).then(function(res){
			console.log(res);
		})
		.catch(function(err){
			console.log(err);
		})
		function loadImage(src) {
			return new Promise((resolve,reject) => {
				var vm = this 
				var img = new Image();
				img.setAttribute('crossOrigin', 'anonymous');
				img.onload = function(event) {
					resolve(true);
				};
				img.onerror = function(err) {
					reject(err);
				};
				img.src = src;
			});
		}
	</script>
</body>
</html>
